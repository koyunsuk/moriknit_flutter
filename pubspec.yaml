name: moriknit_flutter
description: "MoriKnit - knitting record app"
publish_to: 'none'

version: 0.9.3+2003

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  go_router: ^17.1.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  image_picker: ^1.1.2
  image_cropper: ^12.1.0
  cached_network_image: ^3.3.1
  file_picker: ^10.3.10
  flutter_pdfview: ^1.3.2
  excel: ^4.0.6

  google_sign_in: ^7.2.0
  kakao_flutter_sdk_user: ^1.9.1

  flutter_web_plugins:
    sdk: flutter
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cupertino_icons: ^1.0.8

  intl: ^0.20.2
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  share_plus: ^12.0.1
  uuid: ^4.4.2
  connectivity_plus: ^7.0.0
  http: ^1.2.2
  device_info_plus: ^11.0.0
  package_info_plus: ^8.0.0
  youtube_player_flutter: ^9.1.1
  video_player: ^2.9.2
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/app_icon.png
    - assets/login_logo.png
    - assets/splash_cat.png
