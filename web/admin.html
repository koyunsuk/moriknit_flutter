<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>MoriKnit Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e8e8f0;
    }

    .card {
      width: 100%;
      max-width: 380px;
      padding: 48px 40px;
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #b39ddb, #9575cd);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-badge {
      font-size: 11px;
      font-weight: 600;
      color: #9575cd;
      background: rgba(149, 117, 205, 0.15);
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid rgba(149, 117, 205, 0.3);
      margin-left: 4px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.4px;
    }

    .subtitle {
      font-size: 13px;
      color: #7070a0;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #9575cd, #7c55b8);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      border-radius: 12px;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.2px;
      border: 0;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: #3a3a5a;
    }

    .footer a {
      color: #5a5a8a;
      text-decoration: none;
    }

    .footer a:hover {
      color: #9575cd;
    }

    .divider {
      height: 1px;
      background: #2a2a45;
      margin: 28px 0;
    }

    .warning {
      font-size: 12px;
      color: #5a5a8a;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.5;
    }

    .warning-icon {
      flex-shrink: 0;
      margin-top: 1px;
      color: #4a4a7a;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">MK</div>
      <span class="logo-text">MoriKnit</span>
      <span class="logo-badge">Admin</span>
    </div>

    <h1>관리자 로그인</h1>
    <p class="subtitle">MoriKnit 운영 관리자 페이지입니다.<br>관리자 계정으로 로그인해주세요.</p>

    <button class="btn" onclick="window.location.href='/admin'">관리자 계정으로 로그인</button>

    <div class="divider"></div>

    <p class="warning">
      <span class="warning-icon">!</span>
      <span>이 페이지는 관리자 전용입니다. 권한이 없는 계정으로 로그인하면 접근이 차단됩니다.</span>
    </p>

    <div class="footer">
      <a href="/" onclick="window.location.href='/'; return false;">메인 페이지로</a>
    </div>
  </div>
</body>
</html>
